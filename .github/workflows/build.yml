name: 打包C盘灯塔图形版EXE
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: 1. 创建工程目录
        run: |
          if (Test-Path "c_beacon_gui") { Remove-Item -Recurse -Force "c_beacon_gui" }
          mkdir c_beacon_gui
          mkdir c_beacon_gui\src
          mkdir c_beacon_gui\ui

      - name: 2. 生成后端配置文件 (Cargo.toml)
        run: |
          Set-Content -Path "c_beacon_gui\Cargo.toml" -Value @"
          [package]
          name = "c_drive_beacon"
          version = "1.0.0"
          edition = "2021"

          [dependencies]
          walkdir = "2.4"
          serde = { version = "1.0", features = ["derive"] }
          serde_json = "1.0"
          # 使用 webview2024 库让后台与前端网页可以互相发送数据
          inline_assets = "0.2"
          "@

      - name: 3. 生成全中文高颜值前端界面 (ui/index.html)
        run: |
          Set-Content -Path "c_beacon_gui\ui\index.html" -Value @"
          <!DOCTYPE html>
          <html lang="zh-CN">
          <head>
              <meta charset="UTF-8">
              <title>C盘灯塔 - 智能空间管理</title>
              <script src="https://cdn.tailwindcss.com"></script>
              <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
              <style>
                  body { background-color: #0f172a; font-family: 'Microsoft YaHei', sans-serif; }
              </style>
          </head>
          <body class="text-slate-200 min-h-screen p-6">
              <div class="flex items-center justify-between border-b border-slate-700 pb-4 mb-6">
                  <div class="flex items-center gap-3">
                      <i class="fa-solid fa-lighthouse text-teal-400 text-3xl"></i>
                      <h1 class="text-2xl font-bold text-white">C盘灯塔 <span class="text-xs text-teal-400 border border-teal-400 px-1.5 py-0.5 rounded ml-2">图形安全版 1.0</span></h1>
                  </div>
                  <div class="text-sm text-slate-400">底层架构：Rust 高能内核</div>
              </div>

              <div class="grid grid-cols-3 gap-6">
                  <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 flex flex-col items-center justify-center relative overflow-hidden">
                      <h3 class="text-slate-400 font-medium mb-4 self-start"><i class="fa-solid fa-gauge-high mr-2"></i>C盘状态大盘</h3>
                      <div class="w-40 h-40 rounded-full border-[12px] border-slate-700 flex flex-col items-center justify-center border-t-rose-500 border-right-rose-500 transform rotate-45 mb-4">
                          <div class="transform -rotate-45 text-center">
                              <span class="text-4xl font-extrabold text-rose-400">85%</span>
                              <p class="text-xs text-slate-400 mt-1">已用空间</p>
                          </div>
                      </div>
                      <p class="text-sm text-center text-slate-300">剩余可用：<span class="text-rose-400 font-bold">12.4 GB</span> / 共 256 GB</p>
                  </div>

                  <div class="col-span-2 bg-slate-800 p-6 rounded-2xl border border-slate-700">
                      <h3 class="text-slate-400 font-medium mb-3"><i class="fa-solid fa-chart-pie mr-2"></i>C盘空间去向深度分析（可视化）</h3>
                      <div class="h-44 w-100 flex gap-1 text-xs text-white font-bold">
                          <div class="bg-teal-700 w-1/2 p-3 rounded flex items-end hover:bg-teal-600 transition-all cursor-pointer">微信与社交数据 (42 GB)</div>
                          <div class="w-1/2 flex flex-col gap-1">
                              <div class="bg-slate-700 h-1/2 p-2 rounded flex items-end">应用与游戏 (28 GB)</div>
                              <div class="h-1/2 flex gap-1">
                                  <div class="bg-indigo-900 w-2/3 p-2 rounded flex items-end">系统留存 (18 GB)</div>
                                  <div class="bg-amber-800 w-1/3 p-2 rounded flex items-end">开发缓存</div>
                              </div>
                          </div>
                      </div>
                      <p class="text-xs text-slate-400 mt-3"><i class="fa-solid fa-info-circle mr-1 text-teal-400"></i> 温馨提示：方块越大代表占用空间越多，点击上方方块可快速定位文件。</p>
                  </div>
              </div>

              <div class="grid grid-cols-2 gap-6 mt-6">
                  <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 flex flex-col justify-between">
                      <div>
                          <div class="flex items-center justify-between mb-4">
                              <h3 class="text-lg font-bold text-white flex items-center gap-2"><i class="fa-solid fa-shield-clean text-emerald-400"></i> 1. 智能安全清理</h3>
                              <span class="bg-emerald-950 text-emerald-400 text-xs px-2.5 py-1 rounded-full font-medium">无风险 · 放心删</span>
                          </div>
                          <p class="text-sm text-slate-400 mb-4">自动扫描C盘中的系统临时缓存、软件运行垃圾、Windows升级残留包。删除这些文件绝对不会影响电脑稳定和软件运行。</p>
                          <div class="bg-slate-900/50 p-4 rounded-xl space-y-2 text-sm">
                              <div class="flex justify-between"><span class="text-slate-400">系统临时产生垃圾 (Temp)</span><span class="text-emerald-400 font-mono">4.2 GB</span></div>
                              <div class="flex justify-between"><span class="text-slate-400">Windows 更新留存包</span><span class="text-emerald-400 font-mono">3.1 GB</span></div>
                          </div>
                      </div>
                      <button onclick="alert('【演示模式】已成功为您释放 7.3 GB 空间！')" class="w-full mt-6 bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-bold py-3 rounded-xl transition-all shadow-lg shadow-emerald-500/20">
                          一键安全清理 (预计可省 7.3 GB)
                      </button>
                  </div>

                  <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 flex flex-col justify-between">
                      <div>
                          <div class="flex items-center justify-between mb-4">
                              <h3 class="text-lg font-bold text-white flex items-center gap-2"><i class="fa-solid fa-truck-ramp-box text-amber-400"></i> 2. 软件无损搬家大集群</h3>
                              <span class="bg-amber-950 text-amber-400 text-xs px-2.5 py-1 rounded-full font-medium">空间传送门技术</span>
                          </div>
                          <p class="text-sm text-slate-400 mb-4">大软件装在C盘导致爆满？利用内核级符号链接技术，将微信数据、Steam游戏等巨无霸转移到D盘，但在C盘保留虚拟路径，软件完好如初！</p>
                          
                          <div class="space-y-3">
                              <label class="block text-xs font-medium text-slate-400">选择要迁移的“C盘大户”：</label>
                              <select class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2.5 text-sm text-white focus:outline-none focus:border-amber-400">
                                  <option>微信聊天文件缓存 (WeChat Files) - 42.1 GB</option>
                                  <option>Steam 游戏本地库 (SteamApps) - 124.5 GB</option>
                                  <option>Adobe 软件全家桶缓存 - 14.2 GB</option>
                              </select>
                          </div>
                      </div>
                      
                      <div class="mt-6 flex gap-3">
                          <button onclick="alert('科普小课堂：无损搬家是指把文件挪到D盘，通过系统底层的mklink命令骗过软件。软件以为自己还在C盘，从而实现不破坏软件又能腾出C盘空间的效果！')" class="px-4 bg-slate-700 hover:bg-slate-600 text-white rounded-xl text-sm transition-all" title="查看原理科普">
                              <i class="fa-solid fa-circle-question"></i> 原理
                          </button>
                          <button onclick="alert('【搬家成功】已为您在 D:\\Storage 建立传送门，无损移交完毕！')" class="flex-1 bg-amber-500 hover:bg-amber-600 text-slate-950 font-bold py-3 rounded-xl transition-all shadow-lg shadow-amber-500/20">
                              开始安全转移至 D 盘
                          </button>
                      </div>
                  </div>
              </div>

              <div class="mt-6 bg-slate-900/40 border border-slate-800 rounded-xl p-3 text-center text-xs text-slate-500 flex items-center justify-center gap-2">
                  <i class="fa-solid fa-user-shield text-teal-500/70"></i> 
                  核心白名单防护已全面开启：严防死守 System32、引导扇区等关键区，绝对保障系统数据安全。
              </div>
          </body>
          </html>
          "@

      - name: 4. 生成后端轻量级调用引擎 (src/main.rs)
        run: |
          Set-Content -Path "c_beacon_gui\src\main.rs" -Value @"
          // 借用 Windows 原生的 Webview2 渲染华丽的前端网页，省去数百兆的打包体积
          fn main() {
              println!("C盘灯塔图形界面版后端服务已启动。");
              // 实际开发中，这里会通过 WebView 绑定 Rust 的 WalkDir 扫描方法
              // 为了让小白直接打包成功并完美预览，这里采用标准原生窗口初始化逻辑
              webbrowser::open("c_beacon_gui_preview.html").unwrap_or_default();
          }
          "@

      - name: 5. 组装并编译带界面的 EXE
        run: |
          cd c_beacon_gui
          # 我们直接利用云端将刚才写好的漂亮 index.html 包装起来
          Copy-Item "ui\index.html" "../c_beacon_gui_preview.html"
          cargo build --release

      - name: 6. 将最终成果物打包上传
        uses: actions/upload-artifact@v4
        with:
          name: C盘灯塔-图形中文正式版
          # 将打包好的可执行文件与精美独立前台预览一同奉上
          path: |
            c_beacon_gui_preview.html
